name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Compile check
        run: |
          uv run python -m compileall app.py config.py widgets.py modals.py rebalance.py main.py client.py

      - name: Import smoke check
        run: |
          uv run python -c "import app, client, config, main, modals, rebalance, widgets"

  build-binaries:
    needs: quality
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            asset_name: public-terminal-linux-x86_64
          - os: macos-latest
            asset_name: public-terminal-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name public-terminal \
            main.py

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/public-terminal dist/release/
          cp .env.example dist/release/
          cp rebalance_config.json dist/release/
          mkdir -p dist/release/cache
          touch dist/release/cache/.gitkeep
          tar -czf dist/${{ matrix.asset_name }}.tar.gz -C dist/release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}.tar.gz

  build-python-package:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build wheel and sdist
        run: uv build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/*.whl
            dist/*.tar.gz

  release:
    needs:
      - build-binaries
      - build-python-package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          find dist -type f \( -name "*.tar.gz" -o -name "*.whl" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.whl
            dist/SHA256SUMS.txt

  publish-pypi:
    needs: build-python-package
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download Python package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/publish

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/publish
