name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            asset_name: public-terminal-linux-x86_64
          - os: macos-latest
            asset_name: public-terminal-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build binary
        run: |
          uv run pyinstaller \
            --onefile \
            --name public-terminal \
            main.py

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/public-terminal dist/release/
          cp .env.example dist/release/
          cp rebalance_config.json dist/release/
          mkdir -p dist/release/cache
          touch dist/release/cache/.gitkeep
          tar -czf dist/${{ matrix.asset_name }}.tar.gz -C dist/release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*.tar.gz
