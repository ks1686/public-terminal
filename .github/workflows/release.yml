name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: go build ./...

      - run: go vet ./...

      - run: go test ./... -race

  build-binaries:
    needs: quality
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: public-terminal-linux-x86_64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: public-terminal-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: public-terminal-macos-x86_64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: public-terminal-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o public-terminal ./cmd/public-terminal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: public-terminal

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Rename binaries for release
        shell: bash
        run: |
          for f in dist/public-terminal-*/public-terminal; do
            dir=$(dirname "$f")
            name=$(basename "$dir")
            cp "$f" "dist/$name"
          done

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          find dist -type f -name "public-terminal-*" -not -path "*/public-terminal" -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/public-terminal-*
            dist/SHA256SUMS.txt
